- type: entity
  name: павший Герой
  parent: BaseMobHuman
  id: MobFallenHero
  description: Когда-то давно, когда Афган был планетой-утопией, когда коорпорация ITOBE питала надежды на светлое будующие, жил герой Афгана. Совершал он множество подвигов и был известен всем. По неизвестным причинам, он никогда не старел и никто не видел его облик вне брони. После Великой Бури он окончательно свихнулся и его сочли павшим. С тех пор все летописи о нем были вырваны из страниц священнописаний.
  components:
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: MovementSpeedModifier
    baseSprintSpeed: 12
    baseWalkSpeed: 8
  - type: Loadout
    prototypes:
      - FallenHeroGear
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SpeechFallenHero
    blackboard:
      MinimumIdleTime: !type:Single
        10
      MaximumIdleTime: !type:Single
        60

- type: startingGear
  id: FallenHeroGear
  equipment:
    head: ClothingHeadHelmetHundskull
    neck: ClothingNeckGorjet
    jumpsuit: ClothingUniformJumpsuitHauberk
    outerClothing: ClothingOuterVestHero
    gloves: ClothingHandsGlovesHero
    shoes: ClothingShoesBootsSubboots
    pocket1: Bib30
    pocket2: Bib30
  inhand:
    - AfganSwordGoldHero


- type: htnCompound
  id: SpeechFallenHero
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SpeakOperator
          speech: "Правосудие!"

      - !type:HTNCompoundTask
        task: MeleeCombatCompound

      - !type:HTNPrimitiveTask
        operator: !type:SpeakOperator
          speech: "СВЯТАЯ СМЕРТЬ!!!"
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:SpeakOperator
            speech: "Все вы чёртовы ублюдки..."
        - !type:HTNCompoundTask
          task: IdleCompound

- type: entity
  name: FallenHero Spawner
  suffix: afgan14
  id: SpawnFallenHero
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: green
    - state: icon
      sprite: Afgan/Clothing/Armor/hero.rsi
  - type: ConditionalSpawner
    prototypes:
    - MobFallenHero






- type: entity
  name: Варлок
  parent: BaseMobHuman
  id: MobWarlock
  description: Один из немногих алхимиков, который достиг мастерства в своем деле. Возможно он шел по ступам Серотого... Но сейчас его окончательно поглотила тёмная сила.
  components:
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: MovementSpeedModifier
    baseSprintSpeed: 12
    baseWalkSpeed: 8
  - type: Loadout
    prototypes:
      - WarlockGear
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SpeechWarlock
    blackboard:
      MinimumIdleTime: !type:Single
        10
      MaximumIdleTime: !type:Single
        60

- type: startingGear
  id: WarlockGear
  equipment:
    head: ClothingHeadHatWarlock
    mask: ClothingMaskBalisticEvil
    jumpsuit: ClothingUniformJumpsuitAlchem
    outerClothing: ClothingOuterVestWarlock
    gloves: ClothingHandsGlovesStal
    shoes: ClothingShoesBootsSteelUpgrade
    pocket1: Bib30
    pocket2: Bib30
  inhand:
    - AfganChaosFragmentHand
    - WoodenBuckler

- type: htnCompound
  id: SpeechWarlock
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SpeakOperator
          speech: "Сразись!"

      - !type:HTNCompoundTask
        task: MeleeCombatCompound
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:SpeakOperator
            speech: "Серотый... Я знаю ты здесь..."
        - !type:HTNCompoundTask
          task: IdleCompound


- type: entity
  name: Warlock Spawner
  suffix: afgan14
  id: SpawnMobWarlock
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: green
    - state: icon
      sprite: Afgan/Clothing/Armor/warlock.rsi
  - type: ConditionalSpawner
    prototypes:
    - MobWarlock
