- type: entity
  name: ХальберМенш
  parent: MobSvin
  id: MobHalbermensh
  suffix: afgan14
  description: Гуманоид, похожий на исхудалую живую кишку или вывернутый пролапс.
  components:
  - type: AnnounceOnSpawn
    message: Ублюдки, вы породили зло - вам с ним и справляться. Хальберменш был призван.
    sender: АЛЛАХ
    sound:
      path: /Audio/Afgan/Misc/new_halbermensch.ogg
    color: "#f1110e"
  - type: Speech
    speechSounds: Halber
    speechVerb: Halber
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: Afgan/Mobs/halbermensh.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bob
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded"]
      state: eyes
      shader: unshaded
  - type: MeleeWeapon
    soundHit:
      collection: PunchPower
    angle: 30
    animation: WeaponArcBite
    attackRate: 2
    damage:
      types:
        Blunt: 30
  - type: Inventory
    templateId: halbermensh
    speciesId: halbermensh
  - type: MovementSpeedModifier
    baseWalkSpeed : 8
    baseSprintSpeed : 10
  - type: MobThresholds
    thresholds:
      0: Alive
      1500: Dead
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 1500
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              path: /Audio/Afgan/fataldeath.ogg
          - !type:SpawnEntitiesBehavior
            spawn:
              Bib:
                min: 100
                max: 1000
              ClothingBeltHalber:
                min: 1
                max: 1
  - type: NightVision
    isToggle: true
    color: "#f1110e"
    playSoundOn: false
  - type: Loadout
    prototypes:
    - HalberGear
  - type: FootprintVisualizer
  - type: NameIdentifier
    group: Halber
  - type: NoSlip
  - type: GhostRole
    prob: 1
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ХальберМенш
    description: ОНИ ВАС СОЗДАЛИ, ЧТОБЫ УМЕРЕТЬ
    rules: УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК УБЕЙ СУК
  - type: Vocal
    sounds:
      Male: Halbermensh
      Female: Halbermensh
      Unsexed: Halbermensh


- type: entity
  parent: BaseItem
  id: AfganHalyabGutsFull
  name: кишка Халиаба
  description: Забитая кишка Халиаба. С минуты на минуту из нее может выползти Хальберменш...
  components:
  - type: Sprite
    sprite: Afgan/Objects/guts.rsi
    layers:
      - state: icon
  - type: GhostRole
    name: ХальберМенш
    description: ОНИ ТЕБЯ ПОРОДИЛИ. ОНИ ДОЛЖНЫ ПОПЛАТИТЬСЯ ЗА ЭТО.
    rules: ОНИ ТЕБЯ ПОРОДИЛИ. ОНИ ДОЛЖНЫ ПОПЛАТИТЬСЯ ЗА ЭТО.
    #raffle:
      #settings: default
  - type: GhostRoleMobSpawner
    prototype: MobHalbermensh
  - type: EmitSoundOnUse
    sound: /Audio/Afgan/Mobs/Halbermensh/halber.ogg
  - type: UseDelay
    delay: 300

- type: startingGear
  id: HalberGear
  equipment:
    belt: ClothingBeltHalber

- type: inventoryTemplate
  id: halbermensh
  slots:
  - name: back
    slotTexture: back
    slotFlags: BACK
    slotGroup: SecondHotbar
    stripTime: 10
    uiWindowPos: 0,1
    strippingWindowPos: 0,0
    displayName: Back
  - name: belt
    slotTexture: belt
    fullTextureName: template_small
    slotFlags: BELT
    slotGroup: SecondHotbar
    stripTime: 6
    uiWindowPos: 1,1
    strippingWindowPos: 0,1
    displayName: Belt

- type: entity
  parent: ClothingBeltStorageBase
  id: ClothingBeltHalber
  name: пояс-кишка
  description: Пояс из кишки Хальберменша.
  suffix: afgan14
  components:
  - type: Sprite
    sprite: Afgan/Clothing/Belts/halber.rsi
  - type: Clothing
    sprite: Afgan/Clothing/Belts/halber.rsi
  - type: ClothingSpeedModifier
    walkModifier: 1.5
    sprintModifier: 1.5
