- type: entity
  name: посох Света
  parent: WeaponWandBase
  id: WeaponStaffSaint
  description: Излучает мощнейшие лучи света, разрывая пространство.
  components:
  - type: Sprite
    sprite: Afgan/Weapons/Ortodoxian/staves.rsi
    layers:
    - state: staff
    - state: saint-effect
      shader: unshaded
      map: ["effect"]
  - type: Item
    heldPrefix: staff
    size: Huge
    sprite: Afgan/Weapons/Ortodoxian/staves.rsi
  - type: Gun
    fireRate: 0.25
    soundGunshot:
      path: /Audio/Afgan/Wearpons/magic.ogg
  - type: HitscanBatteryAmmoProvider
    proto: SaintLaser
    fireCost: 100
  - type: Battery
    maxCharge: 500
    startingCharge: 500
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 10


- type: entity
  name: посох Пламени
  parent: WeaponWandBase
  id: WeaponStaffFlame
  description: Изжигает всё на своем пути.
  components:
  - type: Sprite
    sprite: Afgan/Weapons/Ortodoxian/staves.rsi
    layers:
    - state: staff
    - state: fire-effect
      shader: unshaded
      map: ["effect"]
  - type: Item
    heldPrefix: staff
    size: Huge
    sprite: Afgan/Weapons/Ortodoxian/staves.rsi
  - type: Gun
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    fireRate: 2
    soundGunshot:
      path: /Audio/Magic/fireball.ogg
  - type: BasicEntityAmmoProvider
    proto: ProjectileDragonsBreath
    capacity: 20
    count: 20
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 10








- type: hitscan
  id: SaintLaser
  maxLength: 60
  damage:
    types:
      Heat: 50
      Structural: 10
  muzzleFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: muzzle_beam_heavy2
  travelFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: beam_heavy2
  impactFlash:
    sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
    state: impact_beam_heavy2
