- type: entity
  name: Кустарный гипоспрей
  parent: BaseItem
  description: Модифицированый шприц, использует для впрыска реагентов сжатый воздух.
  id: HyposprayAFGAN
  components:
  - type: Tag
    tags:
      - HyposprayA
  - type: Construction
    graph: hypoGraph
    node: hypo
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: hypo
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 8
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray

- type: entity
