- type: entity
  name: кустарный впрыскиватель
  suffix: afgan14
  parent: BaseItem
  description: Модифицированый шприц, использует для впрыска реагентов сжатый воздух.
  id: HyposprayAFGAN
  components:
  - type: Tag
    tags:
      - HyposprayA
  - type: Construction
    graph: hypoGraph
    node: hypo
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: hypo
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 4
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray

- type: entity
  name: алхимический впрыскиватель
  parent: BaseItem
  suffix: afgan14
  description: В этом впрыскивателе сжатый воздух берется из материи.
  id: HyposprayalcAFGAN
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/hypospray.rsi
    state: hypoalc
  - type: Item
    sprite: Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 15
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Hypospray
    onlyAffectsMobs: false
  - type: UseDelay
    delay: 2
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray
  - type: Construction
    graph: hypoalcGraph
    node: hypoalc
  - type: PointLight
    radius: 1.5
    energy: 2
    color: "#AFEEEE"

- type: entity
