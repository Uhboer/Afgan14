# Спавн-поинты для лейтджойна с фильтрацией по джобам.
# При лейтджойне игрок с подходящим джобом спавнится на случайном из всех
# подходящих поинтов этого типа на станции.
# Если jobs пустой — поинт доступен всем джобам (универсальный).
#
# Маппинг лор-названий на джоб-ID:
#   Каратель        → Captain
#   Директор ITOBE  → HeadOfPersonnel
#   Директор        → StationEngineer
#   Гор             → CentralCommandOfficial
#   Повстанцы       → Reporter, Boxer
#   Алхимики        → TechnicalAssistant
#   Рабы            → AtmosphericTechnician
#   Гражданские     → Bartender, Botanist, Chaplain, Passenger
#   Фракционеры     → Janitor

# ============================================================
# БАЗОВЫЙ (абстрактный) — не ставь на карту напрямую
# ============================================================

- type: entity
  parent: MarkerBase
  id: JobSpawnPointBase
  name: job latejoin spawn point
  abstract: true
  suffix: Job LateJoin Spawn
  components:
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
      - state: green
  - type: JobSpawnPoint
    jobs: []

# ============================================================
# УНИВЕРСАЛЬНЫЙ — спавнит любой джоб при лейтджойне
# ============================================================

- type: entity
  parent: JobSpawnPointBase
  id: JobSpawnPointAny
  name: universal latejoin spawn point
  suffix: Any Job LateJoin Spawn
  # jobs пустой — подходит всем

# ============================================================
# КАРАТЕЛЬ (Captain)
# ============================================================

- type: entity
  parent: JobSpawnPointBase
  id: JobSpawnPointKaratel
  name: karatel latejoin spawn point
  suffix: Каратель LateJoin Spawn
  components:
  - type: JobSpawnPoint
    jobs:
      - Captain

