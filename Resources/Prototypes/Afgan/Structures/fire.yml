- type: entity
  parent: BaseStructure
  id: AfganFireholder
  name: светило
  description: И пусть виден будет мне мой путь дальнейший.
  suffix: afgan14
  components:
  - type: Sprite
    noRot: true
    sprite: Afgan/Structures/fireholder.rsi
    layers:
      - state: bonfire
      - state: burning
  - type: PointLight
    radius: 5
    energy: 3
    color: "#FFC90C"
  - type: AmbientSound
    volume: -2
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 50
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.15,-0.45,0.15,0.15"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
