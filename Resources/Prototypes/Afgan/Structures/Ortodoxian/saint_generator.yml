- type: entity
  name: генератор эссенции
  description: Конвертирует органику в эссенцию.
  id: EssenceGenerator
  parent: BaseStructure
  suffix: afgan14
  components:
  - type: Transform
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: Afgan/Structures/essence_gen.rsi
    layers:
    - state: generator
    - state: gen
      shader: unshaded
    snapCardinals: true
  - type: Icon
    sprite: Afgan/Structures/essence_gen.rsi
    state: gen
  - type: Clickable
  - type: Appearance
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Store
    buySuccessSound: /Audio/Afgan/Misc/essence.ogg
    name: store-preset-name-EssenceGenerator
    categories:
    - EssenceTransaction
    currencyWhitelist:
    - Organic
    balance:
      Organic: 0
  - type: PointLight
    radius: 2
    energy: 5
    color: "#191970"


- type: storeCategory
  id: EssenceTransaction
  name: store-category-EssenceTransaction
  priority: 0


- type: stack
  id: Organic
  name: Органика
  icon: Objects/Specific/Syndicate/telecrystal.rsi
  spawn: Bib1

- type: currency
  id: Organic
  displayName: store-currency-display-organic
  cash:
    1: Organic
  canWithdraw: false


- type: listing
  id: GeneratorEssence
  name: получить эссенцию
  description: Выжать эссенцию из органики.
  productEntity: AfganEssence
  cost:
    Organic: 5
  categories:
  - EssenceTransaction
