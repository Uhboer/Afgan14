- type: entity
  id: ActionSpawnOblezliy
  name: Призвать облезлого
  description: Призывает дикого облезлого, который может напасть и на тебя.
  components:
  - type: WorldTargetAction
    useDelay: 10
    range: 4
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Afgan/Misc/explore.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default
    event: !type:WorldSpawnSpellEvent
      prototypes:
      - id: MobOblezliyWild
        amount: 1
      offset: 0, 1
      speech: action-speech-spell-summon-magicarp


- type: entity
  id: ActionAfganTrap
  name: Создать ловушку
  description: Создает ловушку из разлитой святой эссенции, которая взрывается при контакте. Владелец на ловушке взорваться не может.
  components:
  - type: InstantAction
    useDelay: 50
    itemIconStyle: BigAction
    sound: !type:SoundPathSpecifier
      path: /Audio/Afgan/Misc/explore.ogg
    icon:
      sprite: Afgan/Structures/sainty.rsi
      state: saint
    event: !type:InstantSpawnSpellEvent
      prototype: AfganExplosionRune

- type: entity
  parent: CollideRune
  id: AfganExplosionRune
  description: Разлитая сияющая жижа... интересно, что будет если в нее наступить?
  name: разлитая эссенция
  components:
    - type: TriggerOnCollide
      fixtureID: rune
    - type: ExplodeOnTrigger
    - type: Explosive
      explosionType: Default
      totalIntensity: 15
      intensitySlope: 5
      maxIntensity: 4
      canCreateVacuum: false
    - type: Sprite
      sprite: Afgan/Structures/sainty.rsi
      layers:
        - state: saint

- type: entity
  id: ActionEnergyBall
  name: Шаровая эссенция
  description: Кастует огромный энергетический шар эссенции.
  components:
  - type: Magic
  - type: WorldTargetAction
    useDelay: 60
    itemIconStyle: BigAction
    checkCanAccess: false
    raiseOnUser: true
    range: 60
    sound: !type:SoundPathSpecifier
      path: /Audio/Afgan/Misc/explore.ogg
    icon:
      sprite: Structures/Power/Generation/Tesla/energy_miniball.rsi
      state: tesla_projectile
    event: !type:ProjectileSpellEvent
      prototype: AfganEssenceBall
      speech: ЫАЫЫААА!!!

- type: entity
  name: шар эссенции
  id: AfganEssenceBall
  parent: BaseBullet
  noSpawn: true
  components:
  - type: TimedDespawn
    lifetime: 4
  - type: Sprite
    sprite: Structures/Power/Generation/Tesla/energy_miniball.rsi
    layers:
    - state: tesla_projectile
      shader: unshaded
  - type: StaminaDamageOnCollide
    damage: 70
  - type: EmbeddableProjectile
  - type: Projectile
    deleteOnCollide: false
    soundHit:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: LightningArcShooter
    arcDepth: 1
    maxLightningArc: 4
    shootMinInterval: 1
    shootMaxInterval: 1.5
    shootRange: 5
    lightningPrototype: SuperchargedLightning
  - type: Electrified
    requirePower: false
  - type: Tag
    tags:
      - HideContextMenu
