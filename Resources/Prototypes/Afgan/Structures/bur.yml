- type: entity
  parent: BaseMachine
  id: DrillBase
  abstract: true
  name: drill
  description: A mining drill that extracts resources from the ground.
  suffix: afgan14
  components:
  - type: Sprite
    sprite: Afgan/Structures/bur.rsi
    state: drill
    drawdepth: Overdoors
  - type: Transform
    anchored: true
    noRot: false
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 250
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,7,7
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container

- type: entity
  parent: DrillBase
  id: DrillWeak
  name: weak drill
  description: A simple mining drill that extracts resources automatically.
  components:
  - type: Drill
    enabled: false
    updateDelay: 15
    resources:
      SteelOre1: 2
      Coal1: 2
  - type: Examiner
  - type: Appearance

- type: entity
  parent: DrillBase
  id: DrillNormal
  name: бур
  description: A mining drill that requires an operator nearby.
  components:
  - type: Anchorable
    flags: None
  - type: Drill
    enabled: false
    updateDelay: 3
    resources:
      SteelOre1: 2
      Coal1: 2
  - type: ProximityDrill
    requiredRange: 5.0
  - type: Examiner
  - type: Appearance
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500000
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100000
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak


- type: entity
  parent: DrillBase
  id: DrillHandmade
  name: handmade drill
  description: A crude handmade drill cobbled together from scrap. Slow, but it works.
  components:
  - type: Sprite
    sprite: Afgan/Structures/bur.rsi
    state: shittydrill
    drawdepth: Overdoors
  - type: Drill
    enabled: false
    updateDelay: 25
    resources:
      SteelOre1: 1
      Coal1: 1
  - type: Construction
    graph: DrillHandmadeGraph
    node: drillhandmade
  - type: Examiner
  - type: Appearance

- type: entity
  id: DrillHandmadeFrame
  name: основа самодельного бура
  description: Стальная основа. Нуждается в доработке.
  suffix: afgan14
  components:
  - type: Sprite
    sprite: Afgan/Structures/bur.rsi
    state: shittydrill
    color: "#606060"
    drawdepth: Overdoors
  - type: Transform
    anchored: true
    noRot: false
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 100
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: InteractionOutline
  - type: Clickable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Construction
    graph: DrillHandmadeGraph
    node: drillframe
