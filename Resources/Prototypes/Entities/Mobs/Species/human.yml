# Anything human specific (e.g. UI, input) goes under MobHuman
- type: entity
  parent: BaseMobSpeciesOrganic
  id: BaseMobHuman
  name: Urist McHands
  abstract: true
  components:
  - type: Interaction
    erp: true
  - type: Hunger
  - type: Icon # It will not have an icon in the adminspawn menu without this. Body parts seem fine for whatever reason.
    sprite: Mobs/Species/Human/parts.rsi
    state: full
  - type: Thirst
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: OrganHumanHeart
      amount: 1
    - id: OrganHumanLungs
      amount: 1
    - id: OrganHumanEyes
      amount: 1
    - id: OrganHumanBrain
      amount: 1
    - id: OrganHumanStomach
      amount: 1
    - id: OrganHumanKidneys
      amount: 1
    - id: OrganHumanLiver
      amount: 1
  - type: HumanoidAppearance
    species: Human
    hideLayersOnEquip:
    - Hair
    - Snout
  - type: FootprintVisualizer
  - type: DamageFlash
    intensity0To25: 0.1
    intensity25To50: 0.2
    intensity50To75: 0.4
    intensity75To100: 0.8
    intensity100Plus: 1.0
    pulseFrequency0To25: 0.2
    pulseFrequency25To50: 0.6
    pulseFrequency50To75: 1.0
    pulseFrequency75To100: 1.5
  - type: SolutionContainerManager
    solutions:
      udder:
        maxVol: 150
        reagents:
        - ReagentId: Semen
          Quantity: 20
  - type: Udder
    reagentId: Semen
    quantityPerUpdate: 20
    growthDelay: 30

- type: entity
  parent: BaseSpeciesDummy
  id: MobHumanDummy
  noSpawn: true
