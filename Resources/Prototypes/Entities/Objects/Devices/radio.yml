- type: entity
  name: handheld radio
  description: A handy handheld radio.
  parent: BaseItem
  id: RadioHandheld
  suffix: afgan14
  components:
  - type: TelecomExempt
  - type: RadioMicrophone
    powerRequired: false
    toggleOnInteract: false
    listenRange: 1
  - type: RadioSpeaker
    toggleOnInteract: false
  - type: Intercom
    requiresPower: false
    supportedChannels:
    - Common
    - CentCom
    - Command
    - Engineering
    - Medical
    - Science
    - Security
    - Service
    - Supply
    - OrtodoxChat
    - AfganChat
  - type: Speech
    speechVerb: Robotic
    speechSounds: Radio
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: walkietalkie
    - state: walkietalkie-on
    state: walkietalkie
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: walkietalkie
  - type: Tag
    tags:
    - Radio
  - type: EncryptionKeyHolder
    keySlots: 3
    keysExtractionMethod: Prying
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyAfgan
      - EncryptionKeyCommon
  - type: ActivatableUI
    key: enum.IntercomUiKey.Key
  - type: UserInterface
    interfaces:
      enum.IntercomUiKey.Key:
        type: IntercomBoundUserInterface


- type: entity
  name: security radio
  description: A handy security radio.
  parent: RadioHandheld
  id: RadioHandheldSecurity
  components:
  - type: Sprite
    sprite: Objects/Devices/securityhandy.rsi
  - type: Item
    sprite: Objects/Devices/securityhandy.rsi
    heldPrefix: walkietalkie
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyOrtodox
      - EncryptionKeyCommon

- type: entity
  name: рация
  description: Обычная рация без излишков.
  parent: RadioHandheld
  id: RadioHandheldCommon
  components:
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: walkietalkie
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon

- type: entity
  name: рация алхимика
  description: Рация для торговых переговоров по всем каналам.
  parent: RadioHandheld
  id: RadioHandheldAlchem
  components:
  - type: Sprite
    sprite: Afgan/Objects/alchemhandy.rsi
  - type: Item
    sprite: Afgan/Objects/alchemhandy.rsi
    heldPrefix: walkietalkie
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyOrtodox
      - EncryptionKeyAfgan
